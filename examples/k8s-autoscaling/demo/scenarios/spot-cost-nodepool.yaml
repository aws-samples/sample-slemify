# Demo scenario: a NodePool that only allows on-demand capacity, so it runs
# more expensive than it needs to. The fix the agent applies (in approve or
# autopilot mode) is to add "spot" to its capacity-type requirement.
#
# Applying this manifest RESETS the scenario to its broken state — it overwrites
# capacity-type back to on-demand-only, dropping any "spot" the agent added.
#
# The NodePool is tainted so nothing actually schedules onto its nodes; it
# exists purely as a configuration target for the demo. Consolidation reclaims
# any empty node on its own.
apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: demo-spot-misconfigured
  labels:
    demo.slemify.io/scenario: spot-cost
spec:
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 1m
  template:
    metadata:
      labels:
        demo.slemify.io/scenario: spot-cost
    spec:
      taints:
        - key: demo.slemify.io/broken
          value: "true"
          effect: NoSchedule
      expireAfter: 720h
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default
      requirements:
        - key: kubernetes.io/arch
          operator: In
          values: ["amd64"]
        # The misconfiguration: on-demand only. The agent adds "spot" here.
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: karpenter.k8s.aws/instance-family
          operator: In
          values: ["m5"]
