---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-autoscaling-orchestrator
  namespace: slemify
  labels:
    app: k8s-autoscaling-orchestrator
    slemify.io/component: demo
---
# Read-only RBAC for the agent's tools. The orchestrator describes cluster
# resources and lists their events to ground its answers in live state. It is
# granted ONLY get/list/watch — no create/update/patch/delete — so the agent
# can never mutate the cluster. Resources span cluster-scoped CRDs (NodePool,
# EC2NodeClass, Node) and namespaced kinds the demo reasons about, so this is a
# ClusterRole; scope it to a Role + RoleBinding if you only need one namespace.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: k8s-autoscaling-orchestrator-readonly
  labels:
    app: k8s-autoscaling-orchestrator
    slemify.io/component: demo
rules:
  - apiGroups: ["karpenter.sh"]
    resources: ["nodepools"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["karpenter.k8s.aws"]
    resources: ["ec2nodeclasses"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods", "events", "nodes"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: k8s-autoscaling-orchestrator-readonly
  labels:
    app: k8s-autoscaling-orchestrator
    slemify.io/component: demo
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: k8s-autoscaling-orchestrator-readonly
subjects:
  - kind: ServiceAccount
    name: k8s-autoscaling-orchestrator
    namespace: slemify
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-autoscaling-orchestrator
  namespace: slemify
  labels:
    app: k8s-autoscaling-orchestrator
    slemify.io/component: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-autoscaling-orchestrator
  template:
    metadata:
      labels:
        app: k8s-autoscaling-orchestrator
        slemify.io/component: demo
    spec:
      serviceAccountName: k8s-autoscaling-orchestrator
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        slemify.io/workload: slm
      tolerations:
        - key: slemify.io/slm
          operator: Exists
          effect: NoSchedule
      containers:
        - name: orchestrator
          image: REPLACE_WITH_ECR_IMAGE
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: AWS_REGION
              value: "eu-west-1"
            - name: AWS_DEFAULT_REGION
              value: "eu-west-1"
            - name: TRIAGE_URL
              value: "http://k8s-autoscaling-triage-inference.slemify:8080"
            - name: AUDITOR_URL
              value: "http://k8s-autoscaling-auditor-inference.slemify:8080"
            - name: OPENSEARCH_URL
              value: "http://opensearch-cluster-master.slemify:9200"
            - name: EMBEDDING_URL
              value: "http://k8s-autoscaling-retriever-inference.slemify:8080"
            - name: RERANKER_URL
              value: "http://k8s-autoscaling-reranker.slemify:80"
            - name: INDEX_NAME
              value: "k8s-autoscaling-knowledge"
            - name: LLM_MODEL
              value: "eu.anthropic.claude-sonnet-4-5-20250929-v1:0"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-autoscaling-orchestrator
  namespace: slemify
  labels:
    app: k8s-autoscaling-orchestrator
    slemify.io/component: demo
spec:
  type: ClusterIP
  selector:
    app: k8s-autoscaling-orchestrator
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-autoscaling-reranker
  namespace: slemify
  labels:
    app: k8s-autoscaling-reranker
    slemify.io/component: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-autoscaling-reranker
  template:
    metadata:
      labels:
        app: k8s-autoscaling-reranker
        slemify.io/component: demo
    spec:
      # The reranker service does not call the Kubernetes API.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        slemify.io/workload: slm
      tolerations:
        - key: slemify.io/slm
          operator: Exists
          effect: NoSchedule
      containers:
        - name: reranker
          image: REPLACE_WITH_RERANKER_IMAGE
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            # Thread counts are detected at startup by app.py (_detect_threads):
            # it reads the cgroup CPU limit if one is set, otherwise the cores
            # available on the node. No hardcoded value, so the pod adapts to
            # whatever CPU it's scheduled with. Set RERANKER_THREADS to override.
            # torch/transformers scratch space (root filesystem is read-only).
            - name: HOME
              value: "/tmp"
            - name: TMPDIR
              value: "/tmp"
          resources:
            requests:
              # Memory limit must equal request (security standard).
              # The cross-encoder (~280MB) plus torch runtime fits in 2Gi.
              # CPU request is the scheduling floor; reranking is compute-bound
              # and bursts onto idle node cores (no CPU limit) per the detected
              # thread count above.
              cpu: "10"
              memory: 2Gi
            limits:
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            # Model load + warmup takes a few seconds on CPU.
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-autoscaling-reranker
  namespace: slemify
  labels:
    app: k8s-autoscaling-reranker
    slemify.io/component: demo
spec:
  type: ClusterIP
  selector:
    app: k8s-autoscaling-reranker
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
