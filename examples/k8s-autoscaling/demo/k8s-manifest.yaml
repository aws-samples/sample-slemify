---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: demo-orchestrator
  namespace: slemify
  labels:
    app: demo-orchestrator
    slemify.io/component: demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-orchestrator
  namespace: slemify
  labels:
    app: demo-orchestrator
    slemify.io/component: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-orchestrator
  template:
    metadata:
      labels:
        app: demo-orchestrator
        slemify.io/component: demo
    spec:
      serviceAccountName: demo-orchestrator
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        slemify.io/workload: slm
      tolerations:
        - key: slemify.io/slm
          operator: Exists
          effect: NoSchedule
      containers:
        - name: orchestrator
          image: REPLACE_WITH_ECR_IMAGE
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: AWS_REGION
              value: "eu-west-1"
            - name: AWS_DEFAULT_REGION
              value: "eu-west-1"
            - name: TRIAGE_URL
              value: "http://k8s-autoscaling-triage-inference.slemify:8080"
            - name: AUDITOR_URL
              value: "http://k8s-autoscaling-auditor-inference.slemify:8080"
            - name: OPENSEARCH_URL
              value: "http://opensearch-cluster-master.slemify:9200"
            - name: LLM_MODEL
              value: "eu.anthropic.claude-sonnet-4-5-20250929-v1:0"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: demo-orchestrator
  namespace: slemify
  labels:
    app: demo-orchestrator
    slemify.io/component: demo
spec:
  type: ClusterIP
  selector:
    app: demo-orchestrator
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
