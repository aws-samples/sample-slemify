---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: k8s-autoscaling-orchestrator
  namespace: slemify
  labels:
    app: k8s-autoscaling-orchestrator
    slemify.io/component: demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-autoscaling-orchestrator
  namespace: slemify
  labels:
    app: k8s-autoscaling-orchestrator
    slemify.io/component: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-autoscaling-orchestrator
  template:
    metadata:
      labels:
        app: k8s-autoscaling-orchestrator
        slemify.io/component: demo
    spec:
      serviceAccountName: k8s-autoscaling-orchestrator
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        slemify.io/workload: slm
      tolerations:
        - key: slemify.io/slm
          operator: Exists
          effect: NoSchedule
      containers:
        - name: orchestrator
          image: REPLACE_WITH_ECR_IMAGE
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            - name: AWS_REGION
              value: "eu-west-1"
            - name: AWS_DEFAULT_REGION
              value: "eu-west-1"
            - name: TRIAGE_URL
              value: "http://k8s-autoscaling-triage-inference.slemify:8080"
            - name: AUDITOR_URL
              value: "http://k8s-autoscaling-auditor-inference.slemify:8080"
            - name: OPENSEARCH_URL
              value: "http://opensearch-cluster-master.slemify:9200"
            - name: EMBEDDING_URL
              value: "http://k8s-autoscaling-embedding.slemify:80"
            - name: INDEX_NAME
              value: "k8s-autoscaling-knowledge"
            - name: LLM_MODEL
              value: "eu.anthropic.claude-sonnet-4-5-20250929-v1:0"
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-autoscaling-orchestrator
  namespace: slemify
  labels:
    app: k8s-autoscaling-orchestrator
    slemify.io/component: demo
spec:
  type: ClusterIP
  selector:
    app: k8s-autoscaling-orchestrator
  ports:
    - port: 80
      targetPort: 8000
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8s-autoscaling-embedding
  namespace: slemify
  labels:
    app: k8s-autoscaling-embedding
    slemify.io/component: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8s-autoscaling-embedding
  template:
    metadata:
      labels:
        app: k8s-autoscaling-embedding
        slemify.io/component: demo
    spec:
      # The embedding service does not call the Kubernetes API.
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      nodeSelector:
        slemify.io/workload: slm
      tolerations:
        - key: slemify.io/slm
          operator: Exists
          effect: NoSchedule
      containers:
        - name: embedding
          image: REPLACE_WITH_EMBEDDING_IMAGE
          ports:
            - containerPort: 8080
              protocol: TCP
          env:
            # bge-base-en-v1.5 truncates at 512 tokens; pin threads to the CPU
            # request to avoid oversubscription on a shared node.
            - name: OMP_NUM_THREADS
              value: "2"
            - name: MKL_NUM_THREADS
              value: "2"
            # torch/transformers scratch space (root filesystem is read-only).
            - name: HOME
              value: "/tmp"
            - name: TMPDIR
              value: "/tmp"
          resources:
            requests:
              # Memory limit must equal request (security standard). bge-base
              # (~440MB) plus torch runtime fits comfortably in 2Gi.
              cpu: "2"
              memory: 2Gi
            limits:
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            # Model load + warmup takes a few seconds on CPU.
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: k8s-autoscaling-embedding
  namespace: slemify
  labels:
    app: k8s-autoscaling-embedding
    slemify.io/component: demo
spec:
  type: ClusterIP
  selector:
    app: k8s-autoscaling-embedding
  ports:
    - port: 80
      targetPort: 8080
      protocol: TCP
