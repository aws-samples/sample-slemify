apiVersion: slemify/v1

project:
  name: k8s-autoscaling-tool-router
  task: classification
  domain: >
    Decide which read-only tool, if any, an agent should use to answer a
    Kubernetes autoscaling question before consulting the documentation. Each
    message is classified into exactly one action: inspect_resource when the
    user asks about a specific named, live cluster object or a runtime symptom
    (a NodePool that is not launching nodes, pods stuck Pending, an HPA that is
    not scaling, a ScaledObject that is not triggering) so the agent should
    describe that resource and read its events; validate_config when the message
    contains a pasted Kubernetes manifest (apiVersion/kind/metadata present) that
    should be linted for structural issues and deprecated apiVersions before
    answering; or no_tool when the question is conceptual or how-to (explaining
    how a feature works, best practices, comparisons) and is answerable from the
    documentation alone without touching the cluster. Inputs are noisy
    Slack-style messages that may include YAML snippets and conversational
    tangents.
  labels:
    action:
      - inspect_resource
      - validate_config
      - no_tool

model:
  base: ""  # encoder model ID for classification (a 768d text encoder)
  head: logistic               # logistic | linear | mlp

data:
  bucket: slemify-data
  path: k8s-autoscaling/data/
  sources:
    - path: queries/
      type: raw
  synthetic:
    model: eu.anthropic.claude-sonnet-4-6
    pairs: 1200
  evaluation:
    model: eu.anthropic.claude-sonnet-4-6
    pairs: 150
    sources:
      - path: eval-queries/
        type: raw

training:
  spot: true
