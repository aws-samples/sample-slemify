apiVersion: slemify/v1

project:
  name: k8s-autoscaling-triage
  task: classification
  domain: >
    Classify Kubernetes autoscaling support queries into exactly one
    routing category: karpenter_config for Karpenter NodePool or
    EC2NodeClass questions, keda_config for KEDA ScaledObject or
    TriggerAuthentication questions, hpa_config for HorizontalPodAutoscaler
    questions, pdb_disruption for PodDisruptionBudget questions,
    spot_interruption for Spot instance handling questions,
    multi_resource for questions spanning multiple resource types,
    or noise for off-topic messages like meetings, social chat, or
    unrelated Kubernetes topics. Inputs are noisy Slack-style messages
    that may include YAML snippets and conversational tangents.
    A query that names a specific resource and states a concrete symptom
    and asks how to fix it should be classified into the category of the
    named resource (for example, a named NodePool stuck on on-demand or
    not launching nodes is karpenter_config). Pods stuck Pending — whether
    because of a Deployment nodeSelector, affinity, topology constraint,
    or resource request that no node satisfies, or simply because no node
    is available — span the Deployment workload and node provisioning, so
    classify them as multi_resource. Treat any "pods are Pending, how do I
    fix it" question as multi_resource unless it clearly names a single
    autoscaler resource as the cause.
  labels:
    routing:
      - karpenter_config
      - keda_config
      - hpa_config
      - pdb_disruption
      - spot_interruption
      - multi_resource
      - noise

model:
  base: ""  # encoder model ID for classification (a 768d text encoder)
  head: logistic               # logistic | linear | mlp

data:
  bucket: slemify-data
  path: k8s-autoscaling/data/
  sources:
    - path: queries/
      type: raw
  synthetic:
    model: eu.anthropic.claude-sonnet-4-6
    pairs: 1200
  evaluation:
    model: eu.anthropic.claude-sonnet-4-6
    pairs: 150
    sources:
      - path: eval-queries/
        type: raw

training:
  spot: true
