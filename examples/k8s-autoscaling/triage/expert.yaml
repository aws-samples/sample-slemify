apiVersion: slemify/v1

project:
  name: k8s-autoscaling-triage
  task: classification
  domain: >
    Classify Kubernetes autoscaling support queries into a routing
    category and confidence level. Each message should be classified
    into exactly one routing category: karpenter_config for Karpenter
    NodePool or EC2NodeClass questions, keda_config for KEDA ScaledObject
    or TriggerAuthentication questions, hpa_config for HorizontalPodAutoscaler
    questions, pdb_disruption for PodDisruptionBudget questions,
    spot_interruption for Spot instance handling questions,
    multi_resource for questions spanning multiple resource types,
    or noise for off-topic messages like meetings, social chat, or
    unrelated Kubernetes topics. Inputs are noisy Slack-style messages
    that may include YAML snippets and conversational tangents.
    A query that names a specific resource and states a concrete symptom
    and asks how to fix it is well-specified and should be classified
    confidently into the category of the named resource (for example, a
    named NodePool stuck on on-demand or not launching nodes is
    karpenter_config). Pods stuck Pending because of a Deployment
    nodeSelector or affinity that no node satisfies span the Deployment
    and node provisioning, so classify them as multi_resource. Reserve
    low confidence for genuinely vague or under-specified messages that
    name no resource and could plausibly belong to several categories.
  labels:
    routing:
      - karpenter_config
      - keda_config
      - hpa_config
      - pdb_disruption
      - spot_interruption
      - multi_resource
      - noise

model:
  base: ""  # encoder model ID for classification (a 768d text encoder)
  head: logistic               # logistic | linear | mlp

data:
  bucket: slemify-data
  path: k8s-autoscaling/data/
  sources:
    - path: queries/
      type: raw
  synthetic:
    model: eu.anthropic.claude-sonnet-4-6
    pairs: 1200
  evaluation:
    model: eu.anthropic.claude-sonnet-4-6
    pairs: 150
    sources:
      - path: eval-queries/
        type: raw

training:
  spot: true
