apiVersion: slemify/v1

project:
  name: k8s-autoscaling-auditor
  task: generation
  output_format: free_form
  # Description of the expert's scope. The model is served stock and grounded in
  # retrieved documentation at serving time (RAG), so this is metadata, not a
  # training objective: it documents what the expert is for, not a learned schema.
  domain: >
    Kubernetes autoscaling auditor for Amazon EKS. Answers technical
    questions about Karpenter v1 (NodePool, EC2NodeClass), KEDA v2
    (ScaledObject, TriggerAuthentication), HPA v2, and PodDisruptionBudgets,
    grounding its answers in retrieved documentation. Reviews user-submitted
    YAML for misconfigurations and explains what is wrong, why it is risky,
    and how to fix it.

model:
  base: ""  # HuggingFace model ID (8B recommended for this reasoning task)
  quantize: q4_k_m

data:
  # Generation is served stock (no fine-tuning): the pipeline downloads the base
  # model, converts it to GGUF, quantizes it, and uploads it to
  # s3://<bucket>/models/<project>/. bucket locates that model in S3. Knowledge
  # comes from RAG at serving time, not from training, so there is no synthetic
  # data, grounding, or evaluation generation here.
  bucket: slemify-data
  path: k8s-autoscaling/data/
