apiVersion: slemify/v1

project:
  name: k8s-autoscaling-reranker
  task: reranking
  domain: >
    Domain-tuned cross-encoder reranker for Kubernetes autoscaling knowledge
    retrieval (RAG). After a first-stage vector search returns a handful of
    candidate documents, the reranker reads each (question, document) pair
    together and scores how well the document actually answers the question —
    far more precise than embedding cosine similarity. The corpus is real-world
    Karpenter, KEDA, HPA, and PodDisruptionBudget scenarios. Slemify serves a
    strong stock cross-encoder on CPU via ONNX — fine-tuning is intentionally not
    applied for reranking (a strong cross-encoder is already well-calibrated, and
    reliable fine-tuning needs curated hard negatives). The value here is running
    a cross-encoder reranker on CPU with no GPU.

# No project.labels — reranking output is a relevance score, not a label.

model:
  base: ""  # cross-encoder model ID to serve (e.g. BAAI/bge-reranker-base)

data:
  bucket: slemify-data
  path: k8s-autoscaling/data/
  # The corpus to mine (query, document) pairs from — used to measure the
  # served reranker's ranking quality on a hard candidate set.
  sources:
    - path: queries/
      type: raw
  synthetic:
    model: eu.anthropic.claude-sonnet-4-6
    pairs: 1000
  evaluation:
    model: eu.anthropic.claude-sonnet-4-6
    pairs: 150
    sources:
      - path: eval-queries/
        type: raw

training:
  spot: true
  epochs: 2  # cross-encoder fine-tune epochs
