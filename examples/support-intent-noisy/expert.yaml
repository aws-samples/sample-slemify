apiVersion: slemify/v1

project:
  name: support-intent-noisy
  task: generation
  output_format: pipe_delimited
  domain: >
    Email triage for customer support. Extract intent and sentiment
    from noisy, unstructured emails containing OCR artifacts,
    mobile-device typos, conversational tangents, and corrupted
    character encodings.
  labels:
    intent:
      - refund_request
      - setup_help
      - billing_question
      - technical_issue
      - feedback
      - account_change
      - shipping_inquiry
    sentiment:
      - angry
      - frustrated
      - neutral
      - satisfied

model:
  base: ""  # HuggingFace model ID (3B recommended for classification)
  quantize: q4_k_m

data:
  bucket: slemify-data
  path: support-intent-noisy/data/
  sources:
    - path: emails/
      type: raw
  synthetic:
    model: eu.anthropic.claude-sonnet-4-6
    pairs: 800
  evaluation:
    model: eu.anthropic.claude-sonnet-4-6
    pairs: 100
    sources:
      - path: eval-emails/
        type: raw

training:
  spot: true
