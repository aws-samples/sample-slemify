# Router / classifier agent: fast classification/routing decisions
# Use for: intent detection, ticket triage, query routing, validation gates
# task: classification — a frozen text encoder + a small trained head, trained
# and served entirely on CPU in seconds (~25ms/query, returns label+confidence).
# No GPU, no GGUF. No RAG needed — the decision is based on input patterns.

apiVersion: slemify/v1

project:
  name: <project-name>              # e.g., support-ticket-router
  task: classification              # frozen encoder + trained head (CPU)
  domain: >
    <Describe what this agent classifies and what each category means.
    Be specific about the domain and the decision being made.
    Example: "Classify incoming customer support emails into intent
    categories based on what the customer needs. Categories represent
    the team that should handle the request.">
  labels:
    intent:                          # Primary classification dimension
      - category_1                   # e.g., billing_question
      - category_2                   # e.g., technical_issue
      - category_3                   # e.g., shipping_inquiry
    # Optional: secondary dimension
    # confidence:
    #   - high
    #   - medium
    #   - low

model:
  base: ""                           # text encoder ID, 768d (trained + served on CPU)
  head: logistic                     # logistic | linear | mlp
  # No quantize: encoder-head models are not quantized to GGUF (CPU + ONNX).

data:
  bucket: <your-s3-bucket>
  path: <project-name>/data/
  sources:
    - path: examples/                # Your raw examples (50-200 files)
      type: raw
  synthetic:
    model: eu.anthropic.claude-sonnet-4-6  # Bedrock model for data generation
    pairs: 800                       # 500-1000 is sufficient for routing
  evaluation:
    model: eu.anthropic.claude-sonnet-4-6
    pairs: 100                       # Hold-out eval set

training:
  spot: true                         # CPU training job (seconds; no GPU)
